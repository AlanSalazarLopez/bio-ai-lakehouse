networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
  airflow-db:
  postgres-data:

services:

  # SPARK MASTER
  spark-master:
    build: .  # <--- Esto le dice que use el Dockerfile del root
    container_name: spark-master
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    env_file:
      - .env
    environment:
      - PYSPARK_PYTHON=/usr/bin/python3
    # Volvemos al comando original de Spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --ip spark-master
    volumes:
      - ./src:/opt/spark/work-dir/src
      - ./notebooks:/opt/spark/work-dir/notebooks
      - ./data:/opt/spark/work-dir/data
    networks:
      - lakehouse-net

  # SPARK WORKER
  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=8g
      - SPARK_WORKER_CORES=4
      - PYSPARK_PYTHON=/usr/bin/python3
    volumes:
      - ./data:/opt/spark/work-dir/data
    networks:
      - lakehouse-net

  # POSTGRES
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow123
      - POSTGRES_DB=airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lakehouse-net

  # MINIO
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=dev_password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - lakehouse-net

  # AIRFLOW
  airflow:
    image: apache/airflow:2.10.2
    container_name: airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow123@postgres/airflow
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-db:/opt/airflow
    depends_on:
      - postgres
      - spark-master
    command: bash -c "airflow db init && airflow users create --username admin --password admin123 --firstname Alan --lastname Dev --role Admin --email admin@local.com && airflow standalone"
    networks:
      - lakehouse-net